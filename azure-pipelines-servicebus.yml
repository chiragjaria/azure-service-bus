trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  serviceConnection: 'azure-service-connection'
  functionAppName: 'func-sb-dev-cj'
  pythonVersion: '3.10'

stages:

- stage: Stage3_CodeBuildDeploy
  displayName: 'Deploy Function App'
  jobs:

  - job: BuildAndDeploy
    displayName: Build and Deploy
    steps:

    - checkout: self

    # Setup Python
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
        addToPath: true

    # Create clean build folder
    - task: Bash@3
      displayName: 'Prepare Package'
      inputs:
        targetType: 'inline'
        script: |
          echo "Preparing deployment package..."

          mkdir -p $(Build.ArtifactStagingDirectory)/package

          cp -r azure-service-bus/OrderSender $(Build.ArtifactStagingDirectory)/package/
          cp -r azure-service-bus/OrderProcessor $(Build.ArtifactStagingDirectory)/package/
          cp azure-service-bus/host.json $(Build.ArtifactStagingDirectory)/package/
          cp azure-service-bus/requirements.txt $(Build.ArtifactStagingDirectory)/package/

          ls -la $(Build.ArtifactStagingDirectory)/package

    # Install dependencies INTO package (CRITICAL FIX)
    
    - task: Bash@3
      displayName: 'Install dependencies inside package'
      inputs:
        targetType: 'inline'
        script: |
          cd $(Build.ArtifactStagingDirectory)/package

          echo "Creating directory..."
          mkdir -p .python_packages/lib/site-packages

          echo "Installing dependencies into .python_packages..."
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

          echo "Installed packages:"
          ls .python_packages/lib/site-packages

    # Zip package
    - task: Bash@3
      displayName: 'Create ZIP'
      inputs:
        targetType: 'inline'
        script: |
          cd $(Build.ArtifactStagingDirectory)/package
          zip -r function-app.zip .

          mv function-app.zip $(Build.ArtifactStagingDirectory)/

    # Deploy to Azure
    - task: AzureFunctionApp@1
      displayName: 'Deploy Function App'
      inputs:
        azureSubscription: $(serviceConnection)
        appType: functionAppLinux
        appName: $(functionAppName)
        package: '$(Build.ArtifactStagingDirectory)/function-app.zip'
        runtimeStack: 'PYTHON|$(pythonVersion)'
